<svg width="900" height="260" viewBox="0 0 900 260" xmlns="http://www.w3.org/2000/svg" font-family="'Trebuchet MS','DejaVu Sans',sans-serif">
  <defs>
    <linearGradient id="branchGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1f5c3a"/>
      <stop offset="0.55" stop-color="#3a8c5a"/>
      <stop offset="1" stop-color="#7fb069"/>
    </linearGradient>
    <linearGradient id="wordGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1f5c3a"/>
      <stop offset="1" stop-color="#2f7d4f"/>
    </linearGradient>
  </defs>

  <!-- ===== MARK: phylo-tree rooted in geographic contour lines ===== -->
  <g transform="translate(28,26)">
    <!-- geographic contour lines (topographic map) as the 'ground' the tree roots into -->
    <g fill="none" stroke="#c9812f" stroke-width="2" opacity="0.55" stroke-linecap="round">
      <path d="M4 170 q40 -14 80 0 t80 0"/>
      <path d="M0 184 q46 -18 92 0 t92 0"/>
      <path d="M8 156 q34 -10 68 0 t68 0"/>
    </g>
    <!-- small locality nodes on the contours (sampling sites) -->
    <g fill="#c9812f">
      <circle cx="30" cy="176" r="3.4"/>
      <circle cx="96" cy="166" r="3.4"/>
      <circle cx="150" cy="176" r="3.4"/>
    </g>

    <!-- phylogenetic tree growing upward from the map -->
    <g fill="none" stroke="url(#branchGrad)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
      <!-- root rising from contours -->
      <path d="M92 168 L92 120"/>
      <!-- first split -->
      <path d="M92 120 L52 96"/>
      <path d="M92 120 L132 96"/>
      <!-- left clade splits -->
      <path d="M52 96 L34 64"/>
      <path d="M52 96 L66 64"/>
      <path d="M34 64 L24 38"/>
      <path d="M34 64 L44 38"/>
      <!-- right clade splits -->
      <path d="M132 96 L118 64"/>
      <path d="M132 96 L150 64"/>
      <path d="M150 64 L142 38"/>
      <path d="M150 64 L162 38"/>
    </g>
    <!-- tree tips (taxa) -->
    <g fill="#1f5c3a">
      <circle cx="24" cy="36" r="5"/>
      <circle cx="44" cy="36" r="5"/>
      <circle cx="66" cy="62" r="5"/>
      <circle cx="118" cy="62" r="5"/>
      <circle cx="142" cy="36" r="5"/>
      <circle cx="162" cy="36" r="5"/>
    </g>
    <!-- one amber tip: the focal pest lineage tying tree to map -->
    <circle cx="44" cy="36" r="5" fill="#c9812f"/>
  </g>

  <!-- ===== WORDMARK ===== -->
  <g transform="translate(232,0)">
    <text x="0" y="150" font-size="82" font-weight="700" letter-spacing="-1" fill="url(#wordGrad)">phylogeo<tspan fill="#c9812f">flow</tspan></text>
    <!-- underline that morphs from straight (sequence) to wave (geography) -->
    <path d="M4 172 H360 q20 0 32 9 t32 0 t32 -9 t32 9 t32 0" fill="none" stroke="#7fb069" stroke-width="3.5" stroke-linecap="round"/>
    <text x="6" y="212" font-size="21" font-weight="400" letter-spacing="3.5" fill="#5a6b62" font-family="'DejaVu Sans Mono',monospace">PHYLO · GEO · META-ANALYSIS</text>
  </g>
</svg>
