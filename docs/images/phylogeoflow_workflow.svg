<svg width="1240" height="720" viewBox="0 0 1240 720" xmlns="http://www.w3.org/2000/svg" font-family="'Trebuchet MS','DejaVu Sans',sans-serif">
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L6,3 L0,6 Z" fill="#4a5a52"/>
    </marker>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.5" flood-color="#000" flood-opacity="0.12"/>
    </filter>
  </defs>

  <style>
    .title  { font-size:30px; font-weight:700; fill:#1f5c3a; }
    .sub    { font-size:14px; fill:#5a6b62; font-family:'DejaVu Sans Mono',monospace; letter-spacing:1px; }
    .stage  { font-size:13px; font-weight:700; letter-spacing:0.5px; }
    .proc   { font-size:12.5px; fill:#243b30; font-weight:600; }
    .tool   { font-size:10.5px; fill:#66756c; font-family:'DejaVu Sans Mono',monospace; }
    .io     { font-size:12px; fill:#7a5320; font-weight:600; }
    .legend { font-size:11.5px; fill:#5a6b62; }
    .part   { font-size:13px; font-weight:700; letter-spacing:2px; }
    .flow   { fill:none; stroke:#4a5a52; stroke-width:2.2; marker-end:url(#arrow); }
    .branch { fill:none; stroke:#c9812f; stroke-width:2.2; stroke-dasharray:6 4; marker-end:url(#arrow); }
    .box    { rx:9; filter:url(#soft); }
  </style>

  <!-- header -->
  <text x="40" y="46" class="title">phylogeoflow</text>
  <text x="40" y="68" class="sub">PHYLOGENETIC &amp; PHYLOGEOGRAPHIC META-ANALYSIS · NEXTFLOW DSL2</text>

  <!-- ============ PART 1 band ============ -->
  <rect x="24" y="90" width="1192" height="372" rx="14" fill="#f2f7f3" stroke="#d6e4da"/>
  <text x="44" y="114" class="part" fill="#1f5c3a">PART 1 — MOLECULAR DATA</text>

  <!--   inputs: databases   -->
  <g>
    <rect x="44" y="140" width="120" height="40" class="box" fill="#fff" stroke="#c9812f"/>
    <text x="104" y="165" class="io" text-anchor="middle">BOLD</text>
    <rect x="44" y="190" width="120" height="40" class="box" fill="#fff" stroke="#c9812f"/>
    <text x="104" y="215" class="io" text-anchor="middle">GenBank</text>
    <rect x="44" y="240" width="120" height="40" class="box" fill="#fff" stroke="#c9812f"/>
    <text x="104" y="265" class="io" text-anchor="middle">GBIF</text>
    <text x="104" y="300" class="tool" text-anchor="middle">public repositories</text>
  </g>

  <!-- STAGE 1 — retrieval -->
  <g>
    <rect x="196" y="132" width="150" height="156" class="box" fill="#e3efe7" stroke="#3a8c5a"/>
    <text x="271" y="152" class="stage" fill="#1f5c3a" text-anchor="middle">1 · RETRIEVAL</text>
    <rect x="210" y="162" width="122" height="34" class="box" fill="#fff" stroke="#a9cbb6"/>
    <text x="271" y="183" class="proc" text-anchor="middle">Fetch</text>
    <rect x="210" y="204" width="122" height="34" class="box" fill="#fff" stroke="#a9cbb6"/>
    <text x="271" y="221" class="proc" text-anchor="middle">BOLDconnectR</text>
    <text x="271" y="233" class="tool" text-anchor="middle">rentrez · EDirect · rgbif</text>
    <rect x="210" y="246" width="122" height="30" class="box" fill="#fff" stroke="#a9cbb6"/>
    <text x="271" y="266" class="proc" text-anchor="middle">batched · async</text>
  </g>

  <!-- STAGE 2 — curation -->
  <g>
    <rect x="378" y="132" width="150" height="156" class="box" fill="#e3efe7" stroke="#3a8c5a"/>
    <text x="453" y="152" class="stage" fill="#1f5c3a" text-anchor="middle">2 · CURATION</text>
    <rect x="392" y="162" width="122" height="30" class="box" fill="#fff" stroke="#a9cbb6"/>
    <text x="453" y="182" class="proc" text-anchor="middle">Clean / harmonise</text>
    <rect x="392" y="198" width="122" height="30" class="box" fill="#fff" stroke="#a9cbb6"/>
    <text x="453" y="218" class="proc" text-anchor="middle">CoordinateCleaner</text>
    <rect x="392" y="234" width="122" height="42" class="box" fill="#fff" stroke="#a9cbb6"/>
    <text x="453" y="251" class="proc" text-anchor="middle">Cross-db dedup</text>
    <text x="453" y="267" class="tool" text-anchor="middle">RDP classify</text>
  </g>

  <!-- STAGE 3 — alignment -->
  <g>
    <rect x="560" y="132" width="150" height="156" class="box" fill="#e3efe7" stroke="#3a8c5a"/>
    <text x="635" y="152" class="stage" fill="#1f5c3a" text-anchor="middle">3 · ALIGNMENT</text>
    <rect x="574" y="162" width="122" height="34" class="box" fill="#fff" stroke="#a9cbb6"/>
    <text x="635" y="183" class="proc" text-anchor="middle">MAFFT / PASTA</text>
    <rect x="574" y="204" width="122" height="34" class="box" fill="#fff" stroke="#a9cbb6"/>
    <text x="635" y="221" class="proc" text-anchor="middle">TCS / CORE eval</text>
    <text x="635" y="233" class="tool" text-anchor="middle">T-Coffee</text>
    <rect x="574" y="246" width="122" height="30" class="box" fill="#fff" stroke="#a9cbb6"/>
    <text x="635" y="266" class="proc" text-anchor="middle">BMGE trim</text>
  </g>

  <!-- STAGE 4 — phylogenetics -->
  <g>
    <rect x="742" y="132" width="150" height="156" class="box" fill="#e3efe7" stroke="#3a8c5a"/>
    <text x="817" y="152" class="stage" fill="#1f5c3a" text-anchor="middle">4 · PHYLOGENY</text>
    <rect x="756" y="162" width="122" height="34" class="box" fill="#fff" stroke="#a9cbb6"/>
    <text x="817" y="183" class="proc" text-anchor="middle">ModelFinder</text>
    <rect x="756" y="204" width="122" height="34" class="box" fill="#fff" stroke="#a9cbb6"/>
    <text x="817" y="221" class="proc" text-anchor="middle">IQ-TREE / RAxML-NG</text>
    <text x="817" y="233" class="tool" text-anchor="middle">UFBoot2</text>
    <rect x="756" y="246" width="122" height="30" class="box" fill="#fff" stroke="#a9cbb6"/>
    <text x="817" y="266" class="proc" text-anchor="middle">EPA-NG place</text>
  </g>

  <!-- STAGE 5 — delimitation -->
  <g>
    <rect x="924" y="132" width="128" height="156" class="box" fill="#e3efe7" stroke="#3a8c5a"/>
    <text x="988" y="152" class="stage" fill="#1f5c3a" text-anchor="middle">5 · DELIMIT</text>
    <rect x="938" y="168" width="100" height="44" class="box" fill="#fff" stroke="#a9cbb6"/>
    <text x="988" y="188" class="proc" text-anchor="middle">Species</text>
    <text x="988" y="203" class="tool" text-anchor="middle">mPTP · ASAP</text>
    <rect x="938" y="222" width="100" height="44" class="box" fill="#fff" stroke="#a9cbb6"/>
    <text x="988" y="242" class="proc" text-anchor="middle">MCMC</text>
    <text x="988" y="257" class="tool" text-anchor="middle">support</text>
  </g>

  <!-- STAGE 6 — phylogeography -->
  <g>
    <rect x="1064" y="132" width="136" height="156" class="box" fill="#e3efe7" stroke="#3a8c5a"/>
    <text x="1132" y="152" class="stage" fill="#1f5c3a" text-anchor="middle">6 · PHYLOGEOG</text>
    <rect x="1078" y="162" width="108" height="30" class="box" fill="#fff" stroke="#a9cbb6"/>
    <text x="1132" y="182" class="proc" text-anchor="middle">Haplo-net</text>
    <rect x="1078" y="198" width="108" height="30" class="box" fill="#fff" stroke="#a9cbb6"/>
    <text x="1132" y="218" class="proc" text-anchor="middle">FST · AMOVA</text>
    <rect x="1078" y="234" width="108" height="42" class="box" fill="#fff" stroke="#a9cbb6"/>
    <text x="1132" y="251" class="proc" text-anchor="middle">SAMOVA</text>
    <text x="1132" y="267" class="tool" text-anchor="middle">BASTA</text>
  </g>

  <!-- Part 1 flow arrows -->
  <line class="flow" x1="166" y1="210" x2="194" y2="210"/>
  <line class="flow" x1="348" y1="210" x2="376" y2="210"/>
  <line class="flow" x1="530" y1="210" x2="558" y2="210"/>
  <line class="flow" x1="712" y1="210" x2="740" y2="210"/>
  <line class="flow" x1="894" y1="210" x2="922" y2="210"/>
  <line class="flow" x1="1054" y1="210" x2="1062" y2="210"/>

  <!-- linear step gate note -->
  <text x="44" y="316" class="legend" font-style="italic">Linear chain gated by  step (cumulative 1 to 6); re-run with  resume to extend one stage at a time.</text>

  <!-- occurrences tap-off to Part 2 -->
  <path class="branch" d="M453 288 L453 500 L360 500 L360 540"/>
  <text x="392" y="474" class="tool" fill="#c9812f">occurrences</text>

  <!-- phylogeography tap-off to Part 2.9 -->
  <path class="branch" d="M1132 288 L1132 560 L980 560 L980 592"/>
  <text x="1145" y="470" class="tool" fill="#c9812f">genetic distances</text>

  <!-- ============ PART 2 band ============ -->
  <rect x="24" y="488" width="1192" height="208" rx="14" fill="#faf4ea" stroke="#e6d4b8"/>
  <text x="44" y="512" class="part" fill="#7a5320">PART 2 — ENVIRONMENTAL INTEGRATION  ·  independent branches, gated by --run_* flags</text>

  <!-- STAGE 7 — environmental -->
  <g>
    <rect x="196" y="528" width="220" height="150" class="box" fill="#f6ecd9" stroke="#c9812f"/>
    <text x="306" y="548" class="stage" fill="#7a5320" text-anchor="middle">7 · ENVIRONMENTAL</text>
    <rect x="210" y="558" width="92" height="44" class="box" fill="#fff" stroke="#e0c79c"/>
    <text x="256" y="576" class="proc" text-anchor="middle">Bioclim</text>
    <text x="256" y="591" class="tool" text-anchor="middle">WorldClim</text>
    <rect x="310" y="558" width="92" height="44" class="box" fill="#fff" stroke="#e0c79c"/>
    <text x="356" y="576" class="proc" text-anchor="middle">NDVI · DEM</text>
    <text x="356" y="591" class="tool" text-anchor="middle">MODIS</text>
    <rect x="210" y="610" width="92" height="44" class="box" fill="#fff" stroke="#e0c79c"/>
    <text x="256" y="628" class="proc" text-anchor="middle">WorldPop</text>
    <text x="256" y="643" class="tool" text-anchor="middle">human</text>
    <rect x="310" y="610" width="92" height="44" class="box" fill="#fff" stroke="#e0c79c"/>
    <text x="356" y="628" class="proc" text-anchor="middle">Extract</text>
    <text x="356" y="643" class="tool" text-anchor="middle">terra</text>
  </g>

  <!-- STAGE 8 — SDM -->
  <g>
    <rect x="452" y="528" width="200" height="150" class="box" fill="#f6ecd9" stroke="#c9812f"/>
    <text x="552" y="548" class="stage" fill="#7a5320" text-anchor="middle">8 · NICHE / SDM</text>
    <rect x="466" y="558" width="172" height="40" class="box" fill="#fff" stroke="#e0c79c"/>
    <text x="552" y="583" class="proc" text-anchor="middle">Predictor reduction</text>
    <rect x="466" y="604" width="172" height="40" class="box" fill="#fff" stroke="#e0c79c"/>
    <text x="552" y="623" class="proc" text-anchor="middle">MaxEnt / ENMeval</text>
    <text x="552" y="637" class="tool" text-anchor="middle">suitability · CMIP6 future</text>
  </g>

  <!-- STAGE 9 — landscape genetics -->
  <g>
    <rect x="688" y="528" width="220" height="150" class="box" fill="#f6ecd9" stroke="#c9812f"/>
    <text x="798" y="548" class="stage" fill="#7a5320" text-anchor="middle">9 · LANDSCAPE GEN.</text>
    <rect x="702" y="558" width="192" height="40" class="box" fill="#fff" stroke="#e0c79c"/>
    <text x="798" y="577" class="proc" text-anchor="middle">IBD vs IBE</text>
    <text x="798" y="591" class="tool" text-anchor="middle">geo × env × genetic dist.</text>
    <rect x="702" y="604" width="192" height="40" class="box" fill="#fff" stroke="#e0c79c"/>
    <text x="798" y="623" class="proc" text-anchor="middle">Partial Mantel · MMRR</text>
    <text x="798" y="637" class="tool" text-anchor="middle">GDM · RDA</text>
  </g>

  <!-- Part 2 flow -->
  <line class="flow" x1="416" y1="603" x2="450" y2="603" stroke="#c9812f"/>
  <line class="flow" x1="652" y1="603" x2="686" y2="603" stroke="#c9812f"/>

  <!-- results -->
  <g>
    <rect x="948" y="558" width="252" height="90" class="box" fill="#fff" stroke="#3a8c5a"/>
    <text x="1074" y="582" class="stage" fill="#1f5c3a" text-anchor="middle">RESULTS</text>
    <text x="1074" y="604" class="tool" text-anchor="middle">trees · networks · statistics</text>
    <text x="1074" y="620" class="tool" text-anchor="middle">suitability maps · MMRR</text>
    <text x="1074" y="636" class="tool" text-anchor="middle">pipeline_info · versions.yml</text>
  </g>
  <line class="flow" x1="908" y1="603" x2="946" y2="603" stroke="#c9812f"/>

  <!-- legend -->
  <g transform="translate(44,704)">
    <rect x="0" y="-10" width="16" height="12" rx="3" fill="#e3efe7" stroke="#3a8c5a"/>
    <text x="22" y="0" class="legend">Part 1 stage</text>
    <rect x="120" y="-10" width="16" height="12" rx="3" fill="#f6ecd9" stroke="#c9812f"/>
    <text x="142" y="0" class="legend">Part 2 stage</text>
    <line x1="240" y1="-4" x2="272" y2="-4" class="flow"/>
    <text x="280" y="0" class="legend">linear flow</text>
    <line x1="370" y1="-4" x2="402" y2="-4" class="branch"/>
    <text x="410" y="0" class="legend">data tap-off to independent branch</text>
  </g>
</svg>
