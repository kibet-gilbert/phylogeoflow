name: nf-core linting
# On every push/PR, check code style and nf-core structural conventions.
# Catches: schema/config drift, formatting, missing files, invalid workflows.

on:
  push:
    branches:
      - master
      - main
      - dev
  pull_request:
  release:
    types: [published]

jobs:
  # ---- Prettier: general formatting (yaml, json, md) ----
  prettier:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4

      - name: Install Prettier
        run: npm install -g prettier

      - name: Run Prettier --check
        run: prettier --check ${GITHUB_WORKSPACE}

  # ---- EditorConfig: whitespace / indentation consistency ----
  editorconfig:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4

      - name: Install editorconfig-checker
        run: npm install -g editorconfig-checker

      - name: Run editorconfig-checker
        # skip files that legitimately don't follow editorconfig (lockfiles, svg, etc.)
        run: editorconfig-checker -exclude 'README.md|.*\.svg|.*\.png' $(git ls-files | grep -v '.github/')

  # ---- actionlint: validate the GitHub Actions workflow files themselves ----
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: actionlint
        uses: reviewdog/action-actionlint@v1

  # ---- nf-core lint: pipeline structure & convention checks ----
  nf-core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nextflow
        uses: nf-core/setup-nextflow@v2

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install nf-core tools
        run: |
          python -m pip install --upgrade pip
          pip install nf-core

      - name: Run nf-core pipelines lint
        env:
          GITHUB_COMMENTS_URL: ${{ github.event.pull_request.comments_url }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: nf-core -l lint_log.txt pipelines lint --dir ${GITHUB_WORKSPACE} --markdown lint_results.md

      - name: Upload linting log
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: linting-logs
          path: |
            lint_log.txt
            lint_results.md
